[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
# Gunakan queue:work (bukan listen) karena Supervisor yang akan me-restart processnya
command=php /app/artisan queue:work --tries=3 --timeout=90
autostart=true
autorestart=true
# Jalankan sebagai user laravel (bukan root) agar file log aman
user=laravel
# Jumlah worker paralel (Bisa dinaikkan jadi 5, 10, dst)
numprocs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stopwaitsecs=3600
stopsignal=SIGTERM